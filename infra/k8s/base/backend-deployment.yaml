apiVersion: apps/v1
kind: Deployment
metadata:
  name: ger2-backend
  labels: { app: ger2-backend, tier: api }
spec:
  replicas: 3
  selector:
    matchLabels: { app: ger2-backend }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: ger2-backend }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: backend
          image: ghcr.io/ger2/ger2-backend:IMAGE_TAG
          ports: [{ containerPort: 8000 }]
          envFrom:
            - secretRef: { name: ger2-backend-secrets }
            - configMapRef: { name: ger2-backend-config }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: 1000m, memory: 1Gi }
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30; periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readiness, port: 8000 }
            initialDelaySeconds: 15; periodSeconds: 5
          securityContext:
            runAsNonRoot: true; runAsUser: 1000; allowPrivilegeEscalation: false
      topologySpreadConstraints:
        - maxSkew: 1; topologyKey: kubernetes.io/hostname; whenUnsatisfiable: DoNotSchedule
          labelSelector: { matchLabels: { app: ger2-backend } }
---
apiVersion: v1
kind: Service
metadata:
  name: ger2-backend-svc
spec:
  selector: { app: ger2-backend }
  ports: [{ port: 80, targetPort: 8000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ger2-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1; kind: Deployment; name: ger2-backend
  minReplicas: 3; maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 80 } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ger2-backend-pdb
spec:
  minAvailable: 2
  selector: { matchLabels: { app: ger2-backend } }
